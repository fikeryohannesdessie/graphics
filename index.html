<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Maze Generator Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Maze generation and traversal</h1>
        
        <div class="controls">
            <label>Rows: <input type="number" id="rows" value="15" min="10" max="40"></label>
            <label>Cols: <input type="number" id="cols" value="20" min="10" max="40"></label>
            <label>Speed: <input type="range" id="speed" min="1" max="100" value="75"></label>
            <br><br>
            <label><input type="checkbox" id="bonus-cycles"> Bonus (1 in 20 extra walls eaten)</label>
            <br><br>
            <button id="btn-generate">Generate Maze</button>
            <button id="btn-solve" disabled>Solve Maze</button>
        </div>

        <div class="legend">
            <b>Legend:</b> 
            <span style="color:orange;">Yellow</span> = Generating | 
            <span style="color:red;">Red</span> = Path | 
            <span style="color:blue;">Blue</span> = Dead End
        </div>

        <canvas id="maze-canvas"></canvas>
    </div>
    <script src="maze.js"></script>
</body>
</html>
